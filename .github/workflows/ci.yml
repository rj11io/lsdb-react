name: CI and Release

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lsdb-react
        uses: actions/checkout@v4
        with:
          path: lsdb-react

      - name: Checkout lsdb
        uses: actions/checkout@v4
        with:
          repository: rj11io/lsdb
          path: lsdb

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lsdb-react/package-lock.json

      - name: Build local lsdb dependency
        working-directory: lsdb
        run: |
          npm ci
          npm run build

      - name: Install lsdb-react dependencies
        working-directory: lsdb-react
        run: npm ci

      - name: Install Playwright browser
        working-directory: lsdb-react
        run: npx playwright install --with-deps chromium

      - name: Run lsdb-react tests
        working-directory: lsdb-react
        run: npm test

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Determine package scope
        id: package_scope
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if [[ "$PACKAGE_NAME" == @*/* ]]; then
            echo "scope=${PACKAGE_NAME%%/*}" >> "$GITHUB_OUTPUT"
          else
            echo "scope=" >> "$GITHUB_OUTPUT"
          fi

      - name: Release to npm and GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run semantic-release

      - name: Set up Node.js for GitHub Packages
        if: steps.package_scope.outputs.scope != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: ${{ steps.package_scope.outputs.scope }}

      - name: Publish tarball to GitHub Packages
        if: steps.package_scope.outputs.scope != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish ./dist/*.tgz --ignore-scripts
